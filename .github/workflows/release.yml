name: Release

# push tag vX.Y.Z:跨平台打包桌面安裝檔,自動建立並發佈 GitHub Release。
# workflow_dispatch:dry-run,只跨平台建置驗證、不建 release。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            eb_args: --mac dmg --x64 --arm64
          - os: ubuntu-latest
            eb_args: --linux AppImage deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build installers
        run: pnpm --filter @stele/desktop build && pnpm --filter @stele/desktop exec electron-builder ${{ matrix.eb_args }}
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG 與 package.json 版本 $PKG 不一致" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract release notes
        run: node scripts/changelog-extract.mjs "$GITHUB_REF_NAME" > RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Stele ${GITHUB_REF_NAME#v}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*.dmg artifacts/*.AppImage artifacts/*.deb

  # 發佈後自動更新 Homebrew Cask(cluion/homebrew-tap 的 Casks/stele.rb):
  # 只改 version 與兩個 dmg 的 sha256,url 走 cask 內的 #{version} 自動跟隨。
  # 需在本 repo 設 secret TAP_GITHUB_TOKEN(對 cluion/homebrew-tap 有 contents:write)。
  update-cask:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download release dmgs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.dmg' --dir dmgs
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: cluion/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap
      - name: Bump cask version and sha256
        run: |
          VER="${GITHUB_REF_NAME#v}"
          ARM_SHA="$(sha256sum "dmgs/Stele-$VER-arm64.dmg" | cut -d' ' -f1)"
          INTEL_SHA="$(sha256sum "dmgs/Stele-$VER-x64.dmg" | cut -d' ' -f1)"
          sed -i -E \
            -e "s/^( *version )\".*\"/\1\"$VER\"/" \
            -e "s/^( *sha256 arm: *)\".*\",/\1\"$ARM_SHA\",/" \
            -e "s/^( *intel: *)\".*\"/\1\"$INTEL_SHA\"/" \
            tap/Casks/stele.rb
      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/stele.rb
          if git diff --cached --quiet; then
            echo "cask 無變更,略過"
            exit 0
          fi
          git commit -m "stele ${GITHUB_REF_NAME#v}"
          git push
